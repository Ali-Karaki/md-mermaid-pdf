# Publishes to npm when `main` is updated using npm Trusted Publishing (OIDC).
# No NPM_TOKEN — configure workflow filename + repo on the package npm "Access" page.
#
# If npm shows ENEEDAUTH / misleading 404s, see https://github.com/npm/cli/issues/9088
# and https://philna.sh/blog/2026/01/28/trusted-publishing-npm/
#
# If you set a GitHub *Environment* in the npm Trusted Publisher form, add the same here:
#   jobs.publish.environment: <name>
#
# Package engines vs this job: Node 24 + latest npm satisfies Trusted Publishing
# (npm ≥11.5.1, Node ≥22.14) — https://docs.npmjs.com/trusted-publishers
name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No registry-url: it wires NODE_AUTH_TOKEN (GitHub token) into npmrc → publish uses
      # that instead of OIDC and the registry returns bogus E404. For private npm deps,
      # use registry-url only on an npm ci step with secrets.NPM_READ_TOKEN.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      # Ensure OIDC-capable CLI (bundled npm can lag; avoids misleading ENEEDAUTH).
      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Publish if version is new
        run: |
          set -e
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} is already on npm — skipping publish."
            exit 0
          fi
          npm publish --access public --provenance
